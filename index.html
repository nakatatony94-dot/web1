            } else {
                btn.style.opacity = '0';
                btn.style.transform = 'translateY(10px)';
            }
        });
        btn.addEventListener('mouseenter', () => btn.style.backgroundColor = '#059669');

        // ==================== 生成分类按钮和图书卡片 ====================
        function renderBooks(filteredBooks) {
            const container = document.getElementById('books');
            container.innerHTML = '';

            filteredBooks.forEach(book => {
                const card = `
                <div class="book-card bg-zinc-900 rounded-3xl overflow-hidden" data-category="${book.category}">
                    <img src="${book.img}" alt="${book.title}" class="w-full h-80 object-cover">
                    <div class="p-6">
                        <h3 class="text-2xl font-bold mb-1">${book.title}</h3>
                        <p class="text-emerald-400 mb-4">${book.author} · ${book.category}</p>
                        <p class="text-zinc-400 text-sm mb-6 line-clamp-3">${book.desc}</p>
                        <a href="${book.file}" 
                           class="block text-center bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-medium">
                            📥 下载 EPUB
                        </a>
                    </div>
                </div>`;
                container.innerHTML += card;
            });
        }

        function createCategoryButtons() {
            const categories = ['all', ...new Set(books.map(b => b.category))];
            const container = document.getElementById('category-filters');
            container.innerHTML = '';

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.textContent = cat === 'all' ? '全部' : cat;
                btn.className = `px-6 py-3 rounded-2xl text-sm font-medium ${cat === 'all' ? 'active bg-emerald-600' : 'bg-zinc-800 hover:bg-zinc-700'}`;
                btn.onclick = () => filterCategory(cat);
                container.appendChild(btn);
            });
        }

        function filterCategory(category) {
            // 高亮当前按钮
            document.querySelectorAll('#category-filters button').forEach(btn => {
                btn.classList.toggle('active', 
                    (category === 'all' && btn.textContent === '全部') || 
                    btn.textContent === category);
            });

            const filtered = category === 'all' 
                ? books 
                : books.filter(book => book.category === category);
            
            renderBooks(filtered);
        }

        // 初始化
        createCategoryButtons();
        renderBooks(books);
