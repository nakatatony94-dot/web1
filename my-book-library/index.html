<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的书库 - 免费 EPUB 下载</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .book-card { transition: all 0.3s; }
        .book-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
        .active { background-color: #10b981; color: white; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <header class="bg-black py-16 text-center">
        <h1 class="text-6xl font-bold mb-4">我的书库</h1>
        <p class="text-2xl text-emerald-400">精选好书 · 免费 EPUB 下载</p>
    </header>

    <!-- 分类筛选按钮 -->
    <div class="max-w-7xl mx-auto px-6 pt-8">
        <div class="flex flex-wrap gap-3 justify-center" id="category-filters">
            <button onclick="filterCategory('all')" class="active px-6 py-3 rounded-2xl bg-zinc-800 hover:bg-zinc-700 text-sm font-medium">全部</button>
            <!-- 其他按钮会由 JS 自动生成 -->
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="books">
            <!-- 图书卡片会在这里 -->
        </div>
    </main>

    <footer class="bg-black py-12 text-center text-zinc-500">
        <p>© 2026 我的书库 | 仅供学习交流使用</p>
    </footer>

    <script>
        // ==================== 书籍数据（在这里添加新书） ====================
        const books = [
            {
                title: "王安忆长篇小说十部",
                author: "王安忆",
                category: "小说",
                desc: "王安忆长篇小说十部。",
                img: "images/1.jpg",
                file: "books/王安忆长篇小说十部.epub"
            },
            {
                title: "活着",
                author: "余华",
                category: "文学",
                desc: "福贵的一生，充满苦难却顽强活着。",
                img: "images/2.jpg",
                file: "books/huozhe.epub"
            },
            {
                title: "邱会作回忆录",
                author: "邱会作",
                category: "回忆录",
                desc: "解放军前副总参谋长邱会作中将的回忆",
                img: "images/3.jpg",
                file: "books/邱会作回忆录.epub"
            },
            {
                title: "新发现的周恩来",
                author: "司马清扬和欧阳龙门",
                category: "传记",
                desc: "对周恩来在文革中的表现进行分析",
                img: "images/4.jpg",
                file: "books/新发现的周恩来.epub"
            }
            // 在这里继续添加更多书籍...
        ];

        // ==================== 生成分类按钮和图书卡片 ====================
        function renderBooks(filteredBooks) {
            const container = document.getElementById('books');
            container.innerHTML = '';

            filteredBooks.forEach(book => {
                const card = `
                <div class="book-card bg-zinc-900 rounded-3xl overflow-hidden" data-category="${book.category}">
                    <img src="${book.img}" alt="${book.title}" class="w-full h-80 object-cover">
                    <div class="p-6">
                        <h3 class="text-2xl font-bold mb-1">${book.title}</h3>
                        <p class="text-emerald-400 mb-4">${book.author} · ${book.category}</p>
                        <p class="text-zinc-400 text-sm mb-6 line-clamp-3">${book.desc}</p>
                        <a href="${book.file}" 
                           class="block text-center bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-medium">
                            📥 下载 EPUB
                        </a>
                    </div>
                </div>`;
                container.innerHTML += card;
            });
        }

        function createCategoryButtons() {
            const categories = ['all', ...new Set(books.map(b => b.category))];
            const container = document.getElementById('category-filters');
            container.innerHTML = '';

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.textContent = cat === 'all' ? '全部' : cat;
                btn.className = `px-6 py-3 rounded-2xl text-sm font-medium ${cat === 'all' ? 'active bg-emerald-600' : 'bg-zinc-800 hover:bg-zinc-700'}`;
                btn.onclick = () => filterCategory(cat);
                container.appendChild(btn);
            });
        }

        function filterCategory(category) {
            // 高亮当前按钮
            document.querySelectorAll('#category-filters button').forEach(btn => {
                btn.classList.toggle('active', 
                    (category === 'all' && btn.textContent === '全部') || 
                    btn.textContent === category);
            });

            const filtered = category === 'all' 
                ? books 
                : books.filter(book => book.category === category);
            
            renderBooks(filtered);
        }

        // 初始化
        createCategoryButtons();
        renderBooks(books);
    </script>
</body>
</html>
